# fly.toml app configuration file for Outside Lands 2026
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'outsidelands-picks'
org = 'bottlerock'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[env]
  DB_PATH = '/data/outsidelands.db'
  NODE_ENV = 'production'
  PORT = '8080'

[[mounts]]
  source = 'outsidelands_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
