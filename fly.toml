# fly.toml app configuration file generated for bottlerock-setlist-preferences on 2026-05-11T02:28:46-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bottlerock-setlist-preferences'
org = 'bottlerock'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[env]
  DB_PATH = '/data/bottlerock.db'
  NODE_ENV = 'production'
  PORT = '8080'

[[mounts]]
  source = 'bottlerock_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
