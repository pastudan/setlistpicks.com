# Rename the app and primary region before `fly deploy`. Once the app exists,
# attach Redis with:
#   fly redis create               # pick a name + region; copy the redis:// URL
#   fly secrets set REDIS_URL=...  # paste the URL from the previous command
#
# When you set up Redis in the Fly/Upstash dashboard, set the eviction policy
# to `allkeys-lru` so old groups age out automatically (combined with our
# 90-day TTL that refreshes on every read/write).

app = "bottlerock-setlist-preferences"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
